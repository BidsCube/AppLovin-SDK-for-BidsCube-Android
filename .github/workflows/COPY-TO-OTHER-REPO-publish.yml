# ---------------------------------------------------------------------------
# COPY THIS FILE to your repo (e.g. AppLovin-SDK-for-BidsCube-Android) as:
#   .github/workflows/publish.yml
# Replace the existing publish.yml so CI runs only :sdk:assembleRelease
# (no sourcesJar/javadocJar — those tasks do not exist in the sdk module).
# ---------------------------------------------------------------------------

name: Fast Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build + Release
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Maven credentials from gradle.properties (optional)
        id: load_maven_creds
        run: |
          MAVEN_USER=""
          MAVEN_PASS=""
          if [ -f "gradle.properties" ]; then
            MAVEN_USER=$(grep -E '^mavenCentralUsername=' gradle.properties | cut -d'=' -f2- | tr -d '\r') || true
            MAVEN_PASS=$(grep -E '^mavenCentralPassword=' gradle.properties | cut -d'=' -f2- | tr -d '\r') || true
          fi
          echo "maven_user=$MAVEN_USER" >> $GITHUB_OUTPUT
          echo "maven_pass=$MAVEN_PASS" >> $GITHUB_OUTPUT

      - name: Check for Maven credentials
        id: check_creds
        run: |
          if [ -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ] && [ -n "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ]; then
            echo "have_creds=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ steps.load_maven_creds.outputs.maven_user }}" ] && [ -n "${{ steps.load_maven_creds.outputs.maven_pass }}" ]; then
            echo "have_creds=true" >> $GITHUB_OUTPUT
          else
            echo "have_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle is available (if no gradlew)
        id: gradle_setup
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "No gradlew — installing Gradle 8.11.1"
            sudo apt-get update -y
            sudo apt-get install -y wget unzip
            wget -q "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -P /tmp
            sudo unzip -o /tmp/gradle-8.11.1-bin.zip -d /opt/gradle
            echo "PATH=/opt/gradle/gradle-8.11.1/bin:$PATH" >> $GITHUB_ENV
            echo "gradlew_missing=true" >> $GITHUB_OUTPUT
          else
            chmod +x ./gradlew
            echo "gradlew_missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Gradle wrapper (when missing)
        if: steps.gradle_setup.outputs.gradlew_missing == 'true'
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x ./gradlew

      - name: Install Android SDK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip lib32z1 lib32stdc++6
          ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv /tmp/cmdline-tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build AAR (only assembleRelease — no sourcesJar/javadocJar)
        run: ./gradlew clean :sdk:assembleRelease --no-daemon --stacktrace

      - name: Verify AAR
        run: |
          if ! compgen -G "sdk/build/outputs/aar/*.aar" > /dev/null; then
            echo "AAR not found"
            ls -la sdk/build/outputs/aar 2>/dev/null || true
            exit 1
          fi

      - name: Create GitHub Release and upload AAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "AppLovin Bidscube SDK ${{ github.ref_name }}"
          files: sdk/build/outputs/aar/sdk-release.aar
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
