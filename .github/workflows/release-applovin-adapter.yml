# Build and release AppLovin Bidscube Adapter on tag applovin-adapter-v*
name: Release AppLovin Bidscube Adapter

on:
  push:
    tags:
      - 'applovin-adapter-v*'
  workflow_dispatch: {}

jobs:
  build-and-release:
    name: Build adapter and create GitHub Release
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute for Gradle wrapper
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Install Android SDK (if no gradlew)
        run: |
          if [ ! -f "./gradlew" ]; then
            sudo apt-get update -y
            sudo apt-get install -y wget unzip
            ANDROID_SDK_ROOT="$HOME/android-sdk"
            mkdir -p "$ANDROID_SDK_ROOT"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            mv /tmp/cmdline-tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
            echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          fi

      - name: Build adapter AAR
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew :applovin-adapter:assembleRelease --no-daemon
          else
            gradle :applovin-adapter:assembleRelease --no-daemon
          fi

      - name: Set adapter version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#applovin-adapter-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload AAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AppLovin Bidscube Adapter ${{ steps.version.outputs.version }}
          body: |
            **AppLovin Bidscube Adapter** ${{ steps.version.outputs.version }}
            - Artifact: `com.bidscube:applovin-bidscube-adapter:${{ steps.version.outputs.version }}`
            - Use with AppLovin MAX SDK 13.6.0+ and Bidscube SDK 1.0.2+
          files: |
            applovin-adapter/build/outputs/aar/applovin-adapter-release.aar
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
